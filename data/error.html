<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>404 — Страница не найдена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #fff9f2 0%, #f4ede4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 1.5rem;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(210, 180, 140, 0.08) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(160, 120, 80, 0.06) 1.8%, transparent 2%);
            background-size: 48px 48px, 38px 38px;
            pointer-events: none;
        }

        .hero {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 248, 240, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            text-align: center;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(125deg, #2e241f, #6a4e38);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #3f2e24, #8b694e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0.25rem 0 0.5rem 0;
            letter-spacing: 0.02em;
        }

        .tagline {
            font-size: 1.25rem;
            color: #4f3b2c;
            font-weight: 450;
            max-width: 550px;
            margin: 0 auto 2rem auto;
            line-height: 1.4;
            border-bottom: 1px solid rgba(110, 70, 40, 0.15);
            display: inline-block;
            padding-bottom: 0.6rem;
        }

        .message {
            font-size: 1.1rem;
            color: #5a4233;
            margin-bottom: 2rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(245, 235, 220, 0.6);
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.6rem;
            justify-content: center;
            align-items: center;
            margin-top: 0.8rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            background: #2f2c28;
            color: #fef7ef;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 0.9rem 2.2rem;
            border-radius: 60px;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 245, 225, 0.2);
            cursor: pointer;
        }

        .btn:hover {
            background: #1f1c18;
            transform: translateY(-4px);
            box-shadow: 0 18px 28px -10px rgba(0, 0, 0, 0.25);
        }

        .btn:active {
            transform: translateY(1px);
            transition: 0.05s;
        }

        .btn-first {
            background: #3f2e24;
        }

        .btn-first:hover {
            background: #2a1f18;
        }

        .btn-second {
            background: #7a5a48;
        }

        .btn-second:hover {
            background: #5c4233;
        }

        .btn span {
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .hero {
                padding: 1.8rem 1.2rem;
                border-radius: 2rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .error-code {
                font-size: 4.2rem;
            }
            .tagline {
                font-size: 1rem;
            }
            .message {
                font-size: 0.95rem;
                padding: 0.6rem 1rem;
            }
            .btn {
                padding: 0.7rem 1.6rem;
                font-size: 1rem;
                gap: 0.5rem;
            }
            .button-group {
                gap: 1rem;
            }
        }

        @media (max-width: 450px) {
            .btn {
                width: 80%;
                justify-content: center;
            }
            .button-group {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="error-code">404</div>
        <h1>страница потерялась</h1>
        <div class="tagline">*вы пришли не туда*</div>
        <div class="message">
            ссылка не найдена
        </div>
        <div class="button-group">
            <a href="#" class="btn btn-first" id="homeLink">
                ← на главную
            </a>
            <button class="btn btn-second" id="backBtn">
                ↺ вернуться назад
            </button>
        </div>
    </div>

    <script>
        // Кнопка "на главную" — ссылка на корень сайта (можно заменить на актуальный URL)
        const homeLink = document.getElementById('homeLink');
        // Если нужно перенаправлять на главную страницу магазина (предполагаем что index существует)
        homeLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/';
        });

        // Кнопка "вернуться назад" — эмуляция истории браузера
        const backBtn = document.getElementById('backBtn');
        backBtn.addEventListener('click', () => {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Если истории нет — уходим на главную
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
